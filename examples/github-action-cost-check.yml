# Cache-backed GitHub Actions example for `capped-cost alert`.
#
# Why the cache steps matter:
# - `capped-cost alert` dedupes alerts using a local state file
# - GitHub-hosted runners are ephemeral
# - without restoring/saving that file, every hourly run looks "first"
#
# Required repo secrets:
#   OPENAI_ADMIN_KEY        (or just one provider if you only use one)
#   ANTHROPIC_ADMIN_KEY
#   CAPPED_WEBHOOK_URL      (Slack or Discord)

name: AI spend alert

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  alert:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Compute month key
        id: state
        run: echo "month=$(date -u +%Y-%m)" >> "$GITHUB_OUTPUT"

      - name: Restore alert state
        uses: actions/cache/restore@v4
        with:
          path: .capped-cost.state.json
          key: capped-cost-state-${{ steps.state.outputs.month }}-${{ github.run_id }}
          restore-keys: |
            capped-cost-state-${{ steps.state.outputs.month }}-

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check spend and notify only on threshold events
        env:
          OPENAI_ADMIN_KEY: ${{ secrets.OPENAI_ADMIN_KEY }}
          ANTHROPIC_ADMIN_KEY: ${{ secrets.ANTHROPIC_ADMIN_KEY }}
          CAPPED_WEBHOOK_URL: ${{ secrets.CAPPED_WEBHOOK_URL }}
          CAP_USD: "100"
        run: |
          npx -y capped-cost@latest alert \
            --provider=all \
            --cap="$CAP_USD" \
            --thresholds=0.8,1,1.5 \
            --state-file=.capped-cost.state.json \
            --format=table

      - name: Save alert state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .capped-cost.state.json
          key: capped-cost-state-${{ steps.state.outputs.month }}-${{ github.run_id }}
